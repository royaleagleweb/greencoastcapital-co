<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page not found — Green Coast Capital</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{ --marine:#0C4A53; --teal:#2E8B86; --seafoam:#7FC3B6; --sand:#CDA45C; --mist:#EEF3F2; --ink:#16323A; }
  *{box-sizing:border-box;margin:0}
  body{font-family:"Figtree","Inter",system-ui,sans-serif;background:var(--mist);color:var(--ink);
    min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:32px;
    background-image:radial-gradient(120% 120% at 80% 0%,rgba(127,195,182,.35),transparent 55%),
      radial-gradient(120% 120% at 0% 100%,rgba(46,139,134,.25),transparent 55%);}
  .card{max-width:560px}
  .code{font-family:"Spectral",Georgia,serif;font-weight:600;font-size:clamp(5rem,18vw,9rem);
    line-height:.9;color:var(--marine);letter-spacing:-.03em}
  h1{font-family:"Spectral",Georgia,serif;font-weight:500;font-size:clamp(1.6rem,4vw,2.2rem);
    color:var(--marine);margin:10px 0 14px}
  p{color:#4F6A6C;font-size:1.08rem;line-height:1.6;margin-bottom:28px}
  .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  a.btn{display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-weight:600;
    padding:13px 24px;border-radius:999px;transition:.25s}
  .primary{background:var(--marine);color:var(--mist)}
  .primary:hover{background:#083942}
  .ghost{background:rgba(12,74,83,.06);color:var(--marine);border:1px solid rgba(12,74,83,.18)}
  .ghost:hover{background:rgba(12,74,83,.12)}
  .wave{height:4px;width:120px;margin:0 auto 30px;border-radius:999px;
    background:linear-gradient(90deg,var(--marine),var(--teal),var(--seafoam),var(--sand))}
</style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <div class="wave"></div>
    <h1>This page drifted out to sea</h1>
    <p>The page you’re looking for isn’t here. Let’s get you back to dry land.</p>
    <div class="btns">
      <a class="btn primary" href="/index.html">Back to home</a>
      <a class="btn ghost" href="/contact.html">Contact us</a>
    </div>
  </div>
</body>
</html>
